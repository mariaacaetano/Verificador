<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auditoria SSL/TLS</title>

  <style>
    @media print {
  body {
    background: #ffffff;
    color: #000000;
    padding: 0;
  }

  .container {
    width: 100%;
    box-shadow: none;
    border: none;
    background: #ffffff;
  }

  form,
  .status,
  #downloadPdf,
  .hero p {
    display: none !important;
  }

  .resultado {
    display: block !important;
    border: none;
  }

  .resultado-content {
    color: #000000;
    background: #ffffff;
  }
}


    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --panel: #111827;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --success: #4ade80;
      --danger: #f87171;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #020617 0%, #0b1120 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 32px 16px;
    }

    .container {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 32px;
      border-radius: 24px;
      background: #111827;
      box-shadow: var(--shadow);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .hero p {
      color: var(--muted);
      max-width: 680px;
      margin: 12px auto 0;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: #0f172a;
      color: white;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    button:disabled {
      background: #334155;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      text-align: center;
      min-height: 28px;
    }

    .message {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: bold;
      background: rgba(148, 163, 184, 0.12);
    }

    .message.success {
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .message.error {
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.25);
    }

    .resultado {
      display: none;
      margin-top: 32px;
      background: #ffffff;
      color: #222;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #cfd8dc;
    }

    .resultado.visible {
      display: block;
    }

    .resultado-header {
      padding: 18px 24px;
      background: #d9eeee;
      border-bottom: 1px solid #b7cfd4;
    }

    .resultado-header h2 {
      margin: 0;
      color: #222;
    }

    .resultado-header span {
      color: #555;
      font-size: 14px;
    }

    .resultado-content {
      padding: 24px;
      color: #222;
      background: #fff;
      line-height: 1.5;
      white-space: normal;
      word-break: break-word;
    }

    .resultado-content h1,
    .resultado-content h2,
    .resultado-content h3 {
      color: #333;
      margin-top: 24px;
      margin-bottom: 14px;
    }

    .resultado-content p,
    .resultado-content li {
      color: #333;
      font-size: 15px;
    }

    .resultado-content ul {
      padding-left: 22px;
    }

    .ssl-table {
      width: 100%;
      border-collapse: collapse;
      margin: 22px 0;
      background: #fff;
      color: #222;
      border: 3px solid #b7cfd4;
    }

    .ssl-table th {
      background: #d9eeee;
      padding: 14px;
      text-align: left;
      border: 1px solid #b7cfd4;
    }

    .ssl-table td {
      padding: 14px;
      border: 1px solid #c9dde2;
      vertical-align: middle;
    }

    .ssl-table td:first-child {
      width: 60px;
      text-align: center;
    }

    .ssl-ip {
      color: #0066cc;
      font-size: 18px;
      font-weight: bold;
      text-decoration: underline;
    }

    .ssl-server {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }

    .ssl-status {
      color: #2e7d32;
      font-weight: bold;
    }

    .ssl-grade {
      color: #ff9800;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
    }

    @media (max-width: 640px) {
      .container { padding: 22px; }
      .resultado-content { padding: 16px; }

      .ssl-table,
      .ssl-table thead,
      .ssl-table tbody,
      .ssl-table th,
      .ssl-table td,
      .ssl-table tr {
        display: block;
      }

      .ssl-table tr {
        margin-bottom: 14px;
        border-bottom: 2px solid #b7cfd4;
      }

      .ssl-table td:first-child {
        width: auto;
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="hero">
      <h1>Auditoria SSL/TLS</h1>
      <p>
        Informe um e-mail e um domínio para gerar um relatório claro sobre a segurança do servidor.
      </p>
    </div>

    <form id="auditForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="seuemail@gmail.com" />
      </div>

      <div class="form-group">
        <label for="domain">Domínio ou site</label>
        <input type="text" id="domain" required placeholder="google.com" />
      </div>

      <button type="submit" id="submitButton">Analisar servidor</button>
    </form>

    <div class="status" id="status"></div>

    <div class="resultado" id="resultado">
      <div class="resultado-header">
        <h2>Relatório de Segurança</h2>
        <span>Os resultados aparecem aqui assim que a análise for concluída.</span>
      </div>

      <div class="resultado-content" id="resultadoContent"></div>

      <button
        id="downloadPdf"
        style="display:none;margin-top:20px;"
>
        📄 Baixar Relatório em PDF
      </button>
    </div>
  </div>

  <script>
    const form = document.getElementById("auditForm");
    const status = document.getElementById("status");
    const resultado = document.getElementById("resultado");
    const resultadoContent = document.getElementById("resultadoContent");
    const submitButton = document.getElementById("submitButton");
    const downloadPdf = document.getElementById("downloadPdf");

    function limparRelatorio(texto) {
      if (!texto) return "";

      return texto
        .replace(/^"+|"+$/g, "")
        .replace(/\\n/g, "")
        .replace(/\\"/g, '"')
        .replace(/```html/g, "")
        .replace(/```/g, "")
        .replace(/<!DOCTYPE html>/gi, "")
        .replace(/<html.*?>/gi, "")
        .replace(/<\/html>/gi, "")
        .replace(/<head>[\s\S]*?<\/head>/gi, "")
        .replace(/<body.*?>/gi, "")
        .replace(/<\/body>/gi, "")
        .trim();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      let domain = document.getElementById("domain").value.trim();

      domain = domain
        .replace("https://", "")
        .replace("http://", "")
        .replace("www.", "")
        .split("/")[0]
        .trim();

      if (!email.includes("@")) {
        status.innerHTML = `<span class="message error">Informe um e-mail válido.</span>`;
        return;
      }

      if (!domain.includes(".")) {
        status.innerHTML = `<span class="message error">Informe um domínio válido.</span>`;
        return;
      }

      status.innerHTML = `<span class="message">Analisando servidor... aguarde alguns segundos.</span>`;
      resultado.classList.remove("visible");
      downloadPdf.style.display = "none";
      resultadoContent.innerHTML = "";
      submitButton.disabled = true;
      submitButton.innerText = "Analisando...";

      try {
        const response = await fetch(
          "https://pedromontes.app.n8n.cloud/webhook/d9fdd510-e501-4e4a-a183-816f64d8df03",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email: email,
              domain: domain
            })
          }
        );

        const texto = await response.text();
        const relatorio = limparRelatorio(texto);

        if (response.ok) {
          status.innerHTML = `<span class="message success">Análise concluída! O relatório também foi enviado por e-mail.</span>`;
          resultadoContent.innerHTML = relatorio || `<p>Relatório gerado, mas sem conteúdo retornado.</p>`;
          resultado.classList.add("visible");
          downloadPdf.style.display = "block";
        } else {
          status.innerHTML = `<span class="message error">Erro ao gerar relatório.</span>`;
        }
      } catch (error) {
        status.innerHTML = `<span class="message error">Erro de conexão com o servidor.</span>`;
      } finally {
        submitButton.disabled = false;
        submitButton.innerText = "Analisar servidor";
      }
    });
      downloadPdf.addEventListener("click", async () => {
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultado");

  const canvas = await html2canvas(elemento, {
    scale: 2,
    backgroundColor: "#ffffff"
  });

  const imgData = canvas.toDataURL("image/png");
  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = 210;
  const pageHeight = 297;
  const margin = 10;
  const imgWidth = pageWidth - margin * 2;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  let heightLeft = imgHeight;
  let position = margin;

  pdf.addImage(imgData, "PNG", margin, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight + margin;
    pdf.addPage();
    pdf.addImage(imgData, "PNG", margin, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save("relatorio_ssl_tls.pdf");
});

downloadPdf.addEventListener("click", () => {
  window.print();
});



  </script>
</body>
</html>
